services:
  - type: web
    name: cash-app-foundry-iq-backend
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    dir: ./backend
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /health
